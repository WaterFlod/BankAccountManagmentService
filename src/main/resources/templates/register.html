<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Банк</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/register.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<canvas id="wave-canvas"></canvas>

<header class="header">
    <div class="container">
        <div class="navbar">
            <a th:href="@{/home}" class="logo">Bank</a>
            <div class="nav-links">
                <a href="#">Карты</a>
                <a href="#">Кредиты</a>
                <a href="#">Накопления</a>
            </div>
            <div class="auth-buttons">
                <form method="get" th:action="@{/register}">
                    <button class="btn-outline" type="submit">Стать клиентом</button>
                </form>
                <form method="get" th:action="@{/login}">
                    <button class="btn-primary" >Войти</button>
                </form>
            </div>
        </div>
    </div>
</header>

<main>
    <div class="container">
        <div class="hero">
            <h1>Присоединиться к нам</h1>
        </div>
    </div>

    <div class="registration-section">
        <div class="container">
            <div class="form-container"><h2 class="form-title">Регистрация</h2>
                <div style="text-align: center;">
                    <div class="form-subtitle">Создайте аккаунт для управления капиталом</div>
                </div>

                <form id="registrationForm" th:object="${request}" method="post" th:action="@{/register}">

                    <div th:if="${error}" th:text="${error}" class="error"></div>

                    <div class="name-row">
                        <div class="input-group">
                            <label><i class="fas fa-user"></i> Имя</label>
                            <input type="text" th:field="*{firstName}" id="firstName" placeholder="Александр" required>
                            <span class="field-error" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></span>
                        </div>
                        <div class="input-group">
                            <label><i class="fas fa-user-tie"></i> Фамилия</label>
                            <input type="text" th:field="*{lastName}" id="lastName" placeholder="Воронцов" required>
                            <span class="field-error" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label><i class="fas fa-envelope"></i> Электронная почта</label>
                        <input type="email" th:field="*{email}" id="email" placeholder="name@example.com" required>
                        <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
                    </div>

                    <div class="input-group">
                        <label><i class="fas fa-phone-alt"></i> Телефон</label>
                        <input type="tel" th:field="*{phoneNumber}" id="phone" placeholder="+7 (___) ___-__-__" required>
                        <span class="field-error" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></span>
                    </div>

                    <div class="input-group">
                        <label><i class="fas fa-lock"></i> Пароль</label>
                        <input type="password" th:field="*{password}" id="password" placeholder="Не менее 8 символов" required\>
                        <span class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
                        <span th:if="${confirmError}" th:text="${confirmError}" class="field-error"></span>
                    </div>

                    <div class="input-group">
                        <label><i class="fas fa-check-circle"></i> Подтверждение пароля</label>
                        <input type="password" th:field="*{confirmPassword}" id="confirmPassword" placeholder="Повторите пароль" required>
                        <span class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></span>
                        <span th:if="${confirmError}" th:text="${confirmError}" class="field-error"></span>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="agreement" required>
                        <label for="agreement">
                            Я соглашаюсь с <a href="#">условиями обслуживания</a> и <a href="#">политикой конфиденциальности</a> банка, а также подтверждаю своё согласие на обработку персональных данных в соответствии с требованиями законодательства.
                        </label>
                    </div>
                    <button type="submit" class="register-btn">Стать клиентом Bank</button>

                    <div class="login-link">
                        Уже есть счёт? <a th:href="@{/login}" id="switchToLogin">Войти в личный кабинет</a>
                    </div>

                    <div class="badge">
                        <i class="fas fa-shield-alt"></i> Защищено технологией шифрования
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<footer class="footer">
    <div class="container">
        <div class="copyright">
            © Bank — является вымышленным продуктом.
        </div>
    </div>
</footer>

<script src="js/index.js"></script>
</body>
</html>
